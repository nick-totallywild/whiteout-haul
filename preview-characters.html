<!doctype html>
<html>
<head><meta charset="utf-8"><title>Character preview</title>
<style>html,body{margin:0;height:100%;background:#cfe0ee}#c{display:block;width:100vw;height:100vh}</style></head>
<body>
<canvas id="c"></canvas>
<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/examples/jsm/environments/RoomEnvironment.js';
import { buildBear, buildGunner, bearAssets } from '/src/bears.js';
import { buildGuard, buildLoader } from '/src/scene.js';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xcfe0ee);
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

scene.add(new THREE.HemisphereLight(0xffffff, 0x9aa7b5, 0.95));
const sun = new THREE.DirectionalLight(0xffffff, 1.15);
sun.position.set(6, 12, 8); sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
scene.add(sun);

// ground
const ground = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.MeshStandardMaterial({ color: 0xeef4fa, roughness: 1 }));
ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);

// bear (faces +x) on the left, gunner on the right
const bear = buildBear(bearAssets());
bear.position.set(-2.4, 0, 0); bear.rotation.y = -0.5; scene.add(bear);

// yard worker: elf driving a wheel loader with bars in the bucket (front 3/4)
const loader = buildLoader();
loader.position.set(2.6, 0, 0); loader.rotation.y = 0.7; scene.add(loader);

// guard faces +Z; turn toward the camera. Pitch the rifle rig to a level aim so
// the two-handed hold reads in the still.
const guard = buildGuard();
guard.rig.rotation.x = -0.02;
guard.group.position.set(4.6, 0, 0); guard.group.rotation.y = 0.4; scene.add(guard.group);

const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 100);
camera.position.set(1.1, 3.4, 10.5); camera.lookAt(1.1, 1.0, 0);

// Drive the bear's walk cycle (mirrors the formula in bears.js update) so the
// preview shows a mid-stride pose, not a static stand.
let walkPhase = 0;
function loop() {
  walkPhase += 0.06;
  const ud = bear.userData;
  if (ud.legs) for (const leg of ud.legs) leg.pivot.rotation.z = Math.sin(walkPhase + leg.off) * 0.5;
  bear.position.y = Math.abs(Math.sin(walkPhase)) * 0.1;
  if (ud.head) ud.head.position.y = 1.34 + Math.sin(walkPhase * 2 + 0.5) * 0.04;
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
loop();
window.__ready = true;
</script>
</body>
</html>
