    <line x1="32" y1="11" x2="32" y2="53"/>
    <line x1="13.8" y1="21.5" x2="50.2" y2="42.5"/>
    <line x1="50.2" y1="21.5" x2="13.8" y2="42.5"/>
  </g>
  <!-- gold core: the haul -->
